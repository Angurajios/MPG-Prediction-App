<!DOCTYPE html>
<html>
<head>
    <title>MPG Prediction App</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #87ceeb 0%, #a8d8e8 35%, #d4a574 60%, #8b7355 100%);
            position: relative;
            overflow: hidden;
        }

        /* Road */
        body::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25%;
            background: #2d2d2d;
            border-top: 6px solid #f4d03f;
        }

        /* Sun */
        body::after {
            content: "";
            position: absolute;
            top: 8%;
            right: 12%;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, #fff3b0, #f9c74f);
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(249, 199, 79, 0.5);
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 36px 40px;
            width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .car-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 8px;
        }

        h1 {
            text-align: center;
            font-size: 1.5em;
            color: #1a1a2e;
            margin: 0 0 4px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            font-size: 0.85em;
            margin-bottom: 24px;
        }

        label {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
            display: block;
            margin-bottom: 6px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #f4a623;
            box-shadow: 0 0 0 3px rgba(244, 166, 35, 0.15);
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            background: linear-gradient(135deg, #f4a623, #e8590c);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(232, 89, 12, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 22px;
            padding: 16px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            border-radius: 10px;
            text-align: center;
        }

        .result .label {
            font-size: 0.8em;
            color: #aab;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result .value {
            font-size: 2em;
            font-weight: 700;
            color: #f4d03f;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="car-icon">🚗</div>
        <h1>MPG Predictor</h1>
        <div class="subtitle">Estimate fuel efficiency from vehicle specs</div>

        <form method="POST">
            <div class="input-group">
                <label>Horse Power (HP)</label>
                <input type="number" step="any" name="hp" placeholder="e.g. 110" required>
            </div>

            <div class="input-group">
                <label>Speed (SP)</label>
                <input type="number" step="any" name="sp" placeholder="e.g. 95" required>
            </div>

            <div class="input-group">
                <label>Weight (WT)</label>
                <input type="number" step="any" name="wt" placeholder="e.g. 28.5" required>
            </div>

            <button type="submit">Predict Mileage</button>
        </form>

        {% if prediction is not none %}
        <div class="result">
            <div class="label">Predicted MPG</div>
            <div class="value">{{ prediction }}</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
